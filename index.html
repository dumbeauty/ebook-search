<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>猪猪图书馆 🐷</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink:       #e8739a;
      --pink-mid:   #f2a0bc;
      --pink-light: #fce4ee;
      --pink-pale:  #fff5f8;
      --border:     #f0cdd8;
      --ink:        #3d2040;
      --muted:      #b08fa0;
      --green:      #6abf8a;
      --green-lt:   #e0f5e9;
      --nav-h:      64px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--pink-pale);
      color: var(--ink);
      font-family: 'Nunito', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── 浮动泡泡 ── */
    #bubbles {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .bubble {
      position: absolute; border-radius: 50%; opacity: 0;
      animation: rise linear infinite;
    }
    @keyframes rise {
      0%   { transform: translateY(110vh); opacity: 0; }
      8%   { opacity: .16; }
      92%  { opacity: .16; }
      100% { transform: translateY(-12vh); opacity: 0; }
    }

    /* ── 导航栏 ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--nav-h);
      background: rgba(255,245,248,.88);
      backdrop-filter: blur(14px);
      border-bottom: 2px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.35rem; font-weight: 900; color: var(--pink);
      text-decoration: none; letter-spacing: .02em;
    }
    .nav-pig { font-size: 1.7rem; animation: navBounce 2.2s ease-in-out infinite; display: inline-block; }
    @keyframes navBounce {
      0%,100% { transform: translateY(0) rotate(-4deg); }
      50%      { transform: translateY(-6px) rotate(4deg); }
    }
    .nav-links { display: flex; align-items: center; gap: 6px; }
    .nav-link {
      font-size: .88rem; font-weight: 800; color: var(--muted);
      background: none; border: none; cursor: pointer;
      padding: 7px 14px; border-radius: 999px;
      font-family: inherit; transition: background .15s, color .15s;
      text-decoration: none;
    }
    .nav-link:hover { background: var(--pink-light); color: var(--pink); }
    .nav-link.active { background: var(--pink-light); color: var(--pink); }

    /* ── Hero ── */
    #top { padding-top: var(--nav-h); }
    .hero {
      text-align: center;
      padding: 64px 24px 48px;
      position: relative; z-index: 1;
    }
    .hero-pig {
      font-size: 6rem;
      display: inline-block;
      animation: heroBounce 2.6s ease-in-out infinite;
      filter: drop-shadow(0 10px 24px rgba(232,115,154,.3));
      cursor: pointer; user-select: none;
    }
    @keyframes heroBounce {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50%      { transform: translateY(-18px) rotate(3deg); }
    }
    .hero-title {
      margin-top: 18px;
      font-size: clamp(2.2rem, 7vw, 3.4rem);
      font-weight: 900; color: var(--pink);
      letter-spacing: .04em;
      text-shadow: 0 4px 0 rgba(232,115,154,.18);
    }
    .hero-sub {
      margin-top: 10px;
      font-size: 1.05rem; font-weight: 700;
      color: var(--muted); letter-spacing: .02em;
    }
    .hero-badges {
      display: flex; justify-content: center; gap: 10px;
      flex-wrap: wrap; margin-top: 20px;
    }
    .badge {
      background: #fff; border: 2px solid var(--border);
      color: var(--pink); font-size: .8rem; font-weight: 800;
      padding: 5px 14px; border-radius: 999px;
      animation: badgePop 2s ease-in-out infinite;
    }
    .badge:nth-child(2) { animation-delay: .4s; }
    .badge:nth-child(3) { animation-delay: .8s; }
    @keyframes badgePop {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.06); }
    }

    /* ── 搜索区 ── */
    #search { position: relative; z-index: 1; }
    .search-section {
      max-width: 640px; margin: 0 auto; padding: 0 20px 16px;
    }
    .search-box {
      display: flex; align-items: center;
      background: #fff;
      border: 2.5px solid var(--pink-mid);
      border-radius: 999px;
      padding: 8px 8px 8px 26px;
      box-shadow: 0 6px 28px rgba(232,115,154,.18);
      transition: border-color .2s, box-shadow .2s;
    }
    .search-box:focus-within {
      border-color: var(--pink);
      box-shadow: 0 6px 36px rgba(232,115,154,.32);
    }
    .search-box input {
      flex: 1; border: none; outline: none;
      font-size: 1.05rem; font-weight: 700;
      font-family: inherit; color: var(--ink);
      background: transparent;
    }
    .search-box input::placeholder { color: var(--pink-mid); }
    .btn-search {
      background: linear-gradient(135deg, var(--pink), #d45a82);
      color: #fff; border: none; border-radius: 999px;
      padding: 13px 30px; font-size: 1rem; font-weight: 900;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 4px 14px rgba(232,115,154,.42);
      transition: transform .15s, box-shadow .15s;
      white-space: nowrap;
    }
    .btn-search:hover  { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(232,115,154,.52); }
    .btn-search:active { transform: scale(.96); }
    .btn-search:disabled { background: var(--pink-mid); cursor: not-allowed; transform: none; box-shadow: none; }

    /* 快捷标签 */
    .tags {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin-top: 14px;
    }
    .tag {
      background: #fff; border: 1.5px solid var(--border);
      color: var(--pink); font-size: .82rem; font-weight: 800;
      padding: 6px 16px; border-radius: 999px; cursor: pointer;
      transition: background .15s, transform .15s, border-color .15s;
    }
    .tag:hover { background: var(--pink-light); border-color: var(--pink-mid); transform: translateY(-2px); }

    /* ── 结果区 ── */
    #results { position: relative; z-index: 1; }
    .results-wrap {
      max-width: 700px; margin: 32px auto 80px; padding: 0 20px;
    }

    /* 空态 */
    .state-idle {
      text-align: center; padding: 56px 0;
    }
    .state-idle .idle-icon { font-size: 4rem; display: block; margin-bottom: 14px; animation: heroBounce 2.6s ease-in-out infinite; }
    .state-idle p { color: var(--muted); font-weight: 700; font-size: 1rem; line-height: 1.9; }

    /* 加载 */
    .loading { text-align: center; padding: 64px 0; }
    .loading .spin { font-size: 3.8rem; display: block; animation: spin 1s ease-in-out infinite alternate; }
    @keyframes spin {
      from { transform: rotate(-18deg) scale(.9); }
      to   { transform: rotate(18deg)  scale(1.1); }
    }
    .loading p { color: var(--pink); font-weight: 800; margin-top: 14px; font-size: 1rem; }

    /* 结果头 */
    .results-head {
      display: flex; align-items: center; gap: 10px;
      font-size: .9rem; font-weight: 800; color: var(--muted);
      margin-bottom: 18px; flex-wrap: wrap;
    }
    .results-head strong { color: var(--pink); }
    .count-badge {
      background: var(--pink-light); color: var(--pink);
      font-size: .78rem; font-weight: 900;
      padding: 4px 12px; border-radius: 999px;
    }

    /* 卡片 */
    .card {
      background: #fff;
      border: 2px solid var(--border);
      border-radius: 22px;
      padding: 22px 24px;
      margin-bottom: 16px;
      position: relative; overflow: hidden;
      transition: transform .22s, box-shadow .22s, border-color .22s;
      opacity: 0; transform: translateY(18px);
      animation: cardIn .38s ease forwards;
    }
    @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 5px; height: 100%;
      background: linear-gradient(to bottom, var(--pink), var(--pink-mid));
      border-radius: 5px 0 0 5px;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 32px rgba(232,115,154,.16);
      border-color: var(--pink-mid);
    }

    .card-header { display: flex; gap: 12px; align-items: flex-start; }
    .card-icon {
      flex-shrink: 0; width: 46px; height: 46px;
      background: var(--pink-light); border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
    }
    .card-info { flex: 1; min-width: 0; }
    .card-title {
      font-size: 1.05rem; font-weight: 900; color: var(--ink);
      line-height: 1.4; margin-bottom: 4px;
    }
    .card-meta {
      font-size: .82rem; color: var(--muted); font-weight: 700;
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    }
    .meta-item { display: flex; align-items: center; gap: 3px; }
    .src-badge {
      flex-shrink: 0;
      background: var(--pink-light); color: var(--pink);
      font-size: .72rem; font-weight: 900;
      padding: 4px 10px; border-radius: 999px;
    }

    .card-actions {
      display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap;
    }
    .btn-go {
      display: inline-flex; align-items: center; gap: 5px;
      border: none; border-radius: 999px;
      padding: 9px 20px; font-size: .86rem; font-weight: 800;
      cursor: pointer; font-family: inherit; text-decoration: none;
      transition: transform .15s, box-shadow .15s;
    }
    .btn-go.outline {
      background: var(--pink-light); color: var(--pink);
    }
    .btn-go.outline:hover { background: #fbd0e0; transform: translateY(-1px); }
    .btn-go.solid {
      background: linear-gradient(135deg, var(--green), #52a870);
      color: #fff;
      box-shadow: 0 3px 10px rgba(106,191,138,.35);
    }
    .btn-go.solid:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(106,191,138,.45); }

    /* 无结果 */
    .no-results { text-align: center; padding: 64px 0; }
    .no-results .icon { font-size: 3.5rem; display: block; margin-bottom: 12px; }
    .no-results p { color: var(--muted); font-weight: 700; font-size: 1rem; line-height: 1.9; }

    /* ── 回顶部按钮 ── */
    #topBtn {
      position: fixed; bottom: 32px; right: 28px; z-index: 200;
      width: 52px; height: 52px; border-radius: 999px;
      background: linear-gradient(135deg, var(--pink), #d45a82);
      color: #fff; border: none; cursor: pointer;
      font-size: 1.4rem; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(232,115,154,.5);
      opacity: 0; pointer-events: none;
      transition: opacity .3s, transform .3s;
    }
    #topBtn.show { opacity: 1; pointer-events: auto; }
    #topBtn:hover { transform: translateY(-3px); }

    /* ── Footer ── */
    footer {
      text-align: center; padding: 28px 20px;
      font-size: .82rem; color: var(--muted); font-weight: 700;
      border-top: 2px dashed var(--border);
      position: relative; z-index: 1;
    }

    @media (max-width: 520px) {
      .nav-links .nav-link:not(:last-child) { display: none; }
      .hero-pig { font-size: 4.5rem; }
      .btn-search { padding: 12px 20px; }
    }
  </style>
</head>
<body>

<div id="bubbles"></div>

<!-- 导航栏 -->
<nav>
  <a class="nav-brand" href="#top">
    <span class="nav-pig">🐷</span>
    猪猪图书馆
  </a>
  <div class="nav-links">
    <a class="nav-link active" href="#top">首页</a>
    <a class="nav-link" href="#search">搜书</a>
    <a class="nav-link" href="#results">结果</a>
  </div>
</nav>

<!-- Hero -->
<div id="top"></div>
<section class="hero">
  <div class="hero-pig" id="heroPig">🐷</div>
  <div class="hero-title">猪猪图书馆</div>
  <div class="hero-sub">🌐 你的线上移动图书馆</div>
  <div class="hero-badges">
    <span class="badge">📚 海量书目</span>
    <span class="badge">🔍 实时搜索</span>
    <span class="badge">🌟 免费借阅</span>
  </div>
</section>

<!-- 搜索 -->
<section id="search" class="search-section">
  <div class="search-box">
    <input type="text" id="query" placeholder="🔍 搜书名、作者…" autocomplete="off" />
    <button class="btn-search" id="btn" onclick="doSearch()">找书 🐽</button>
  </div>
  <div class="tags">
    <span class="tag" onclick="quickSearch('economics')">📈 经济学</span>
    <span class="tag" onclick="quickSearch('psychology')">🧠 心理学</span>
    <span class="tag" onclick="quickSearch('philosophy')">💡 哲学</span>
    <span class="tag" onclick="quickSearch('history')">🏛️ 历史</span>
    <span class="tag" onclick="quickSearch('fiction')">📖 小说</span>
    <span class="tag" onclick="quickSearch('science')">🔬 科学</span>
  </div>
</section>

<!-- 结果 -->
<section id="results">
  <div class="results-wrap" id="main">
    <div class="state-idle">
      <span class="idle-icon">📚</span>
      <p>猪猪在等你搜书哦～<br>输入书名或点上面的标签快速搜索</p>
    </div>
  </div>
</section>

<!-- 回顶部 -->
<button id="topBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="回到顶部">↑</button>

<footer>🐷 猪猪图书馆 · 你的线上移动图书馆 · 数据来自 Open Library</footer>

<script>
  const API = 'https://web-production-2c644.up.railway.app';

  /* 泡泡 */
  const colors = ['#f2a0bc','#fce4ee','#e8739a','#f9c4d8','#fdd5e4','#fff0f5'];
  document.querySelectorAll || (function(){
    const c = document.getElementById('bubbles');
    for(let i=0;i<20;i++){
      const b = document.createElement('div');
      b.className='bubble';
      const s = Math.random()*70+20;
      b.style.cssText=`width:${s}px;height:${s}px;background:${colors[Math.floor(Math.random()*colors.length)]};left:${Math.random()*100}%;animation-duration:${Math.random()*16+10}s;animation-delay:${Math.random()*12}s;`;
      c.appendChild(b);
    }
  })();
  (function(){
    const c = document.getElementById('bubbles');
    for(let i=0;i<20;i++){
      const b = document.createElement('div');
      b.className='bubble';
      const s = Math.random()*70+20;
      b.style.cssText=`width:${s}px;height:${s}px;background:${colors[Math.floor(Math.random()*colors.length)]};left:${Math.random()*100}%;animation-duration:${Math.random()*16+10}s;animation-delay:${Math.random()*12}s;`;
      c.appendChild(b);
    }
  })();

  /* 猪猪互动 */
  const pigEmojis = ['🐷','🐽','🐖','🥰','😘','✨','💕','🎀','🌸'];
  const heroPig = document.getElementById('heroPig');
  heroPig.addEventListener('click', ()=>{
    heroPig.textContent = pigEmojis[Math.floor(Math.random()*pigEmojis.length)];
    setTimeout(()=>heroPig.textContent='🐷', 900);
  });

  /* 回顶部按钮显示 */
  const topBtn = document.getElementById('topBtn');
  window.addEventListener('scroll', ()=>{
    topBtn.classList.toggle('show', window.scrollY > 300);
  });

  /* 导航高亮 */
  const sections = ['top','search','results'];
  window.addEventListener('scroll', ()=>{
    let current = 'top';
    sections.forEach(id=>{
      const el = document.getElementById(id);
      if(el && window.scrollY >= el.offsetTop - 100) current = id;
    });
    document.querySelectorAll('.nav-link').forEach(l=>{
      l.classList.toggle('active', l.getAttribute('href')==='#'+current);
    });
  });

  /* 搜索 */
  document.getElementById('query').addEventListener('keydown', e=>{
    if(e.key==='Enter') doSearch();
  });

  function quickSearch(q){
    document.getElementById('query').value = q;
    doSearch();
    document.getElementById('search').scrollIntoView({behavior:'smooth'});
  }

  async function doSearch(){
    const q = document.getElementById('query').value.trim();
    if(!q) return;

    const main = document.getElementById('main');
    const btn  = document.getElementById('btn');

    btn.disabled = true;
    btn.textContent = '搜索中🐽…';
    main.innerHTML = `<div class="loading"><span class="spin">🐷</span><p>猪猪正在图书馆里找书，稍等哦～</p></div>`;

    // 滚到结果区
    document.getElementById('results').scrollIntoView({behavior:'smooth', block:'start'});

    try {
      const res  = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      const list = data.results || [];

      if(!list.length){
        main.innerHTML = `<div class="no-results"><span class="icon">😢</span><p>猪猪找不到这本书…<br>换个关键词试试吧！</p></div>`;
        return;
      }

      const bookIcons = ['📗','📘','📙','📕','📒','📓','📔'];

      main.innerHTML = `
        <div class="results-head">
          🐷 猪猪找到了
          <span class="count-badge">${list.length} 本</span>
          关于 <strong>「${escHtml(q)}」</strong> 的书！
        </div>
        ${list.map((book,i)=>`
          <div class="card" style="animation-delay:${i*.055}s">
            <div class="card-header">
              <div class="card-icon">${bookIcons[i%bookIcons.length]}</div>
              <div class="card-info">
                <div class="card-title">${escHtml(book.title)}</div>
                <div class="card-meta">
                  ${book.author?`<span class="meta-item">✍️ ${escHtml(book.author)}</span>`:''}
                  ${book.year?`<span class="meta-item">📅 ${book.year}年</span>`:''}
                </div>
              </div>
              <span class="src-badge">${escHtml(book.source)}</span>
            </div>
            <div class="card-actions">
              <a class="btn-go outline" href="${book.link}" target="_blank" rel="noopener">📖 查看详情</a>
              ${book.borrow?`<a class="btn-go solid" href="${book.borrow}" target="_blank" rel="noopener">🌟 免费借阅</a>`:''}
            </div>
          </div>
        `).join('')}
      `;

    } catch(err){
      main.innerHTML = `<div class="no-results"><span class="icon">😵</span><p>网络出错了，猪猪晕了…<br>请稍后再试！</p></div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = '找书 🐽';
    }
  }

  function escHtml(s){
    if(!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
